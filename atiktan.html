<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atıktan Katma Değere — Posa Ekonomisi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="atiktan">

    <div class="app-container">
        <!-- Sol Panel -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2>Atık Haritası</h2>
                <p>İle tıklayarak potansiyeli keşfet</p>
            </div>

            <!-- Kategori Lejandı -->
            <div class="legend-panel">
                <p class="legend-title">Hammadde Kategorisi</p>
                <div class="legend-grid">
                    <div class="legend-item" data-cat="narenciye"><span class="legend-dot" style="background:#f97316"></span> Narenciye 🍊</div>
                    <div class="legend-item" data-cat="findik"><span class="legend-dot" style="background:#92400e"></span> Fındık 🌰</div>
                    <div class="legend-item" data-cat="uzum"><span class="legend-dot" style="background:#7c3aed"></span> Üzüm 🍇</div>
                    <div class="legend-item" data-cat="zeytin"><span class="legend-dot" style="background:#65a30d"></span> Zeytin 🫒</div>
                    <div class="legend-item" data-cat="cay"><span class="legend-dot" style="background:#0891b2"></span> Çay 🍵</div>
                    <div class="legend-item" data-cat="tahil"><span class="legend-dot" style="background:#d97706"></span> Tahıl 🌾</div>
                    <div class="legend-item" data-cat="diger"><span class="legend-dot" style="background:#6366f1"></span> Özel Ürün 🌿</div>
                </div>
                <div class="potential-legend">
                    <p class="legend-title" style="margin-top:12px">Potansiyel</p>
                    <div class="pot-row"><span class="pot-badge pot-yuksek">Yüksek</span> PDF'de özel bölge</div>
                    <div class="pot-row"><span class="pot-badge pot-orta">Orta</span> Güçlü hammadde tabanı</div>
                    <div class="pot-row"><span class="pot-badge pot-baslangic">Başlangıç</span> Gelişme aşaması</div>
                </div>
            </div>

            <ul id="province-list" class="province-list"></ul>
        </aside>

        <!-- Harita -->
        <main class="map-container">
            <div id="svgMap" class="turkey-map"></div>
        </main>
    </div>

    <!-- Modal -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <button id="close-modal" class="close-btn">&times;</button>
            <h3 id="modal-title">İl Adı</h3>
            <div class="modal-meta">
                <span id="modal-cat-badge" class="cat-badge"></span>
                <span id="modal-potential" class="pot-badge"></span>
            </div>
            <p id="modal-extra" class="modal-extra-text"></p>
            <div id="modal-compounds" class="compounds-list"></div>
        </div>
    </div>

    <script src="posa-data.js"></script>
    <script src="navbar.js"></script>
    <script src="atiktan.js"></script>
</body>
</html>
